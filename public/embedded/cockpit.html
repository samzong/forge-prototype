  return (
    <header className="bg-white border-b border-slate-200 sticky top-0 z-30">

          <a href="index.html" className="flex items-center gap-2 mr-2 group flex-shrink-0">

          </a>
        )}

        <nav className="flex items-center">
          {NAV_TABS.map((t) => {
            const active = t.id === activeTabId;
            return (
              <button key={t.id} onClick={() => onTabChange(t)}
                className={`flex items-baseline gap-1.5 px-2.5 py-1.5 rounded-md text-[12.5px] transition ${
                  active ? 'bg-slate-900 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'
                }`}>
                <span className="text-[10px] font-mono text-slate-400">{t.num}</span>
                <span className="font-semibold">{t.label}</span>
              </button>
            );
          })}

        <div className="flex-1"></div>

        {ctx && (
          <div className="flex items-center gap-1.5 bg-violet-50 border border-violet-200 rounded-md pl-2 pr-1 py-1 text-[11px]">

            <button onClick={onCtxClear} className="text-violet-500 hover:text-violet-800 ml-1 px-1">✕</button>
          </div>
        )}

        {typeof redlines === 'number' && redlines > 0 && (
          <div className="flex items-center gap-1.5 text-[11px] text-red-600 font-semibold">
            <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>

function CommandPalette({ open, onClose, onLocalJump }) {
  const [query, setQuery] = useState('');
  const [cursor, setCursor] = useState(0);
  const inputRef = useRef(null);

  const filtered = useMemo(() => {
    const q = query.toLowerCase().trim();
    if (!q) return PALETTE_ITEMS;
    return PALETTE_ITEMS.filter(i =>
      i.label.toLowerCase().includes(q) || i.hint.toLowerCase().includes(q) || i.type.includes(q)
    );
  }, [query]);

  useEffect(() => {
    if (open) { setQuery(''); setCursor(0); setTimeout(() => inputRef.current?.focus(), 50); }
  }, [open]);
  useEffect(() => { setCursor(0); }, [query]);

  if (!open) return null;

  const choose = (item) => {
    onClose();
    // 同文件跳转用 React state；跨文件用 location
    if (item.target.startsWith('cockpit.html')) {
      const view = item.target.split('#')[1];
      onLocalJump(view, item.ctx ? { type: 'customer', name: item.ctx } : null);
    } else {
      if (item.ctx) sessionStorage.setItem('tf_ctx', JSON.stringify({ type: 'customer', name: item.ctx }));
      window.location.href = item.target;
    }
  };

  const onKey = (e) => {
    if (e.key === 'Escape')    { e.preventDefault(); onClose(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setCursor(c => Math.min(filtered.length - 1, c + 1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setCursor(c => Math.max(0, c - 1)); return; }
    if (e.key === 'Enter')     { e.preventDefault(); const item = filtered[cursor]; if (item) choose(item); }
  };

  const TYPE_ICON  = { page: '📄', cust: '🏢', model: '🧊' };
  const TYPE_LABEL = { page: '页面', cust: '客户', model: '模型' };

  return (
    <div className="fixed inset-0 z-50 bg-slate-900/40 flex items-start justify-center pt-24" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-xl w-full mx-6 overflow-hidden" onClick={e => e.stopPropagation()}>
        <div className="flex items-center gap-3 px-4 py-3 border-b border-slate-100">
          <span className="text-slate-400 text-base">⌘K</span>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)} onKeyDown={onKey}
            placeholder="找客户 / 找模型 / 跳页面…"
            className="flex-1 text-[14px] text-slate-900 bg-transparent focus:outline-none placeholder:text-slate-400" />
          <span className="text-[10px] text-slate-400 font-mono">{filtered.length}</span>
        </div>
        <div className="max-h-80 overflow-y-auto">
          {filtered.length === 0 && (
            <div className="px-4 py-8 text-center text-[12px] text-slate-400">
              没匹配 — 试试 "星河"、"GPT" 或 "客户"
            </div>
          )}
          {filtered.map((item, i) => {
            const sel = i === cursor;
            return (
              <button key={i} onClick={() => choose(item)}
                onMouseEnter={() => setCursor(i)}
                className={`w-full px-4 py-2.5 flex items-center gap-3 text-left transition ${sel ? 'bg-violet-50' : 'hover:bg-slate-50'}`}>
                <span className="text-base">{TYPE_ICON[item.type]}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-[13px] font-semibold text-slate-900">{item.label}</div>
                  <div className="text-[10px] text-slate-400">{item.hint}</div>
                </div>
                <span className="text-[9px] uppercase font-bold tracking-wider text-slate-400">{TYPE_LABEL[item.type]}</span>
              </button>
            );
          })}
        </div>
        <div className="px-4 py-2 border-t border-slate-100 bg-slate-50 flex items-center gap-3 text-[10px] text-slate-400 font-mono">
          <span>↑↓ 选择</span>
          <span>⏎ 跳转</span>
          <span>Esc 关闭</span>
        </div>
      </div>
    </div>
  );
}

function WhatIfPanel({ ctx, onSubmit }) {
  const [pricing, setPricing] = useState(5);
  const [qPrice,  setQPrice]  = useState(-2);
  const [lQuota,  setLQuota]  = useState(10);
  const [ladder,  setLadder]  = useState(true);

  const computed = useMemo(() => {
    const base = 23.7;
    const delta = pricing * 0.3 + qPrice * (-0.1) + lQuota * 0.05 + (ladder ? 0.5 : 0);
    const newRate = base + delta;
    const monthGain = (delta / base) * 3.92;
    return {
      newRate: newRate.toFixed(1),
      delta: delta.toFixed(1),
      monthGain: monthGain.toFixed(2),
      confidence: '±0.6pt',
      sample: 'n=12, 偏差来自租户行为弹性',
      atRisk: pricing >= 5 ? 3 : 0,
    };
  }, [pricing, qPrice, lQuota, ladder]);

  const [showHint, setShowHint] = useState(false);

  return (
    <div className="bg-gradient-to-br from-violet-50 to-white border border-violet-200 rounded-xl p-4">
      <div className="flex items-baseline justify-between mb-3">
        <div>

        <SliderRow label="[L-70B] 配额" value={lQuota} setValue={setLQuota} min={-20} max={50} suffix="%" />
        <div className="flex items-center gap-3">
          <div className="w-40 text-[11px] text-slate-700">[长 context] 阶梯定价</div>
          <button onClick={() => setLadder(!ladder)}
            className={`w-9 h-5 rounded-full relative transition ${ladder ? 'bg-violet-600' : 'bg-slate-300'}`}>
            <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition ${ladder ? 'left-[18px]' : 'left-0.5'}`}></span>

      <div className="bg-white border border-slate-200 rounded-lg p-3">
        <div className="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-2">预测结果</div>
        <div className="space-y-1.5 text-[12px]">
          <div className="flex items-center justify-between">

            <div className="flex items-center gap-1">
              <span className="font-mono text-slate-500">23.7%</span>
              <span className="text-slate-400">→</span>
              <span className="font-mono font-bold text-emerald-700">{computed.newRate}%</span>

              <button onClick={() => setShowHint(!showHint)}

function Page3({ ctx, draftFromP2, jumpToTab, setDraftFromP2, setRedlines, setFlashedCustomerName, completeTodoFor, audit, addAudit }) {
  const [selectedLever, setSelectedLever] = useState(draftFromP2 ? 'pricing' : null);
  const [reason, setReason] = useState(draftFromP2?.reason || '');
  const [executed, setExecuted] = useState(false);
  const [policies, setPolicies] = useState(ACTIVE_POLICIES);

  // 当从 Page 2 收到新草稿时
  useEffect(() => {
    if (draftFromP2) {
      setSelectedLever('pricing');
      setReason(draftFromP2.reason || '');
    }
  }, [draftFromP2]);

  const draft = draftFromP2 || (ctx ? { kind: '待选杠杆', customer: ctx.name } : null);

  const onExecute = () => {
    if (!reason.trim()) return;
    setExecuted(true);
    // 加入审计流
    addAudit({
      time: new Date().toTimeString().slice(0,5),
      who: 'Zhang',
      what: `${draft.customer} · ${draft.kind}`,
      impact: '影响 1 租户',
      ok: true,
      rollback: true,
    });
    // 加入战情面板
    setPolicies(p => [
      { id: `new-${Date.now()}`, age: '00:00', label: `${draft.customer} · ${draft.kind}`, by: 'Zhang' },
      ...p,
    ]);
    // 0.5s 后跳回 P1 + 闪绿 + 红线减一
    setTimeout(() => {
      setRedlines(r => Math.max(0, r - 1));
      if (draft?.customer) {
        setFlashedCustomerName(draft.customer);
        setTimeout(() => setFlashedCustomerName(null), 2500);
        completeTodoFor(draft.customer);
      }
      setDraftFromP2(null);
      setExecuted(false);
      jumpToTab('p1');
    }, 500);
  };

  const onRevoke = (p) => {
    setPolicies(prev => prev.filter(x => x.id !== p.id));
  };

  return (
    <div className="pb-8">
      {/* Peter 融合 · 工厂体检 (集群 overview + GPU 拓扑跳 llm-base) */}
      <ClusterOverviewStrip />
      <WarRoom policies={policies} onRevoke={onRevoke} />
      <div className="grid grid-cols-2 gap-4 px-6 mt-4">
        <LeversPanel selected={selectedLever} setSelected={setSelectedLever} draft={draft} />
        <ImpactPreview draft={draft} reason={reason} setReason={setReason} onExecute={onExecute} executed={executed} />
      </div>
      <AuditFeed audit={audit} onRollback={(a) => alert(`回滚 ${a.what} (原型示意)`)} />
      {/* Peter 融合 · 工厂健康告警 (硬件/模型/容量,与决策审计流并列) */}
      <FactoryAlertsPanel />
    </div>
  );
}

                <div className="flex-1 text-slate-700">{l.text}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-slate-200 p-5">
        <div className="flex items-baseline justify-between mb-3">
          <div>
            <div className="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">本周决策流水</div>
            <div className="text-[11px] text-slate-400 mt-0.5">来自 P3 · 指挥台审计日志</div>
          </div>
          <div className="text-[11px] text-slate-400 font-mono">{audit.length} 条</div>
        </div>
        <div className="space-y-2">
          {audit.map((a, i) => (
            <div key={i} className="flex items-center gap-3 text-[12px] px-3 py-2 bg-slate-50 rounded-lg">
              <div className="w-12 font-mono text-slate-400 text-[11px]">{a.time}</div>
              <div className="w-14 text-slate-500 text-[11px]">{a.who}</div>
              <div className="flex-1 text-slate-800 font-medium">{a.what}</div>
              <div className="text-slate-400 text-[11px]">{a.impact}</div>
              {a.rollback && <span className="text-[10px] text-violet-600 font-semibold">可回滚</span>}
            </div>
          ))}
        </div>
      </div>

      <div className="text-center text-[11px] text-slate-400 pt-2 pb-6">
        原型占位 · 正式版将由 LLM 自动生成叙述段落 + 数据图表
      </div>
    </div>
  );
}

/* ============================================================
   App 主组件 + 全局状态 + 跨页联动
   ============================================================ */

function App() {
  // 嵌入模式:?embed=1 时隐藏与宿主重复的外壳元素
  const isEmbed = (() => {
    if (typeof window === 'undefined') return false;
    return new URLSearchParams(window.location.search).get('embed') === '1';
  })();

  // hash 路由
  const initialView = (() => {
    const h = (typeof window !== 'undefined' ? window.location.hash : '').replace('#', '');
    return ['p1','p2','p3'].includes(h) ? h : 'p1';
  })();

  const [activeTab, setActiveTab] = useState(initialView);

  // 全局 ctx (跨页 + 跨文件，sessionStorage)
  const [ctx, setCtx] = useState(() => {
    try {
      const raw = sessionStorage.getItem('tf_ctx');
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  });
  useEffect(() => {
    if (ctx) sessionStorage.setItem('tf_ctx', JSON.stringify(ctx));
    else sessionStorage.removeItem('tf_ctx');
  }, [ctx]);

  // 跨页状态
  const [draftFromP2,         setDraftFromP2]         = useState(null);
  const [flashedCustomerName, setFlashedCustomerName] = useState(null);
  const [redlines,            setRedlines]            = useState(3);
  const [todos]                                       = useState(TODOS_INIT);
  const [completedTodos,      setCompletedTodos]      = useState({});
  const [audit,               setAudit]               = useState(AUDIT_INIT);
  const [paletteOpen,         setPaletteOpen]         = useState(false);

  // hash 同步
  useEffect(() => {
    if (window.location.hash !== '#' + activeTab) {
      window.history.replaceState(null, '', '#' + activeTab);
    }
  }, [activeTab]);
  useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace('#', '');
      if (['p1','p2','p3','p4'].includes(h)) setActiveTab(h);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // 全局键盘 1-4 + ⌘K
  useEffect(() => {
    const handler = (e) => {
      const tag = e.target.tagName;
      const inField = tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable;
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setPaletteOpen(true);
        return;
      }
      if (inField) return;
      if (e.key >= '1' && e.key <= '4') {
        const tab = NAV_TABS[parseInt(e.key) - 1];
        if (tab) setActiveTab(tab.id);
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  const onTabChange = (tab) => setActiveTab(tab.id);

  // 内部跳转工具
  const jumpToTab = (id, payload) => {
    if (payload?.ctx) setCtx(payload.ctx);
    if (payload?.draft) setDraftFromP2(payload.draft);
    setActiveTab(id);
  };

  const completeTodoFor = (customerName) => {
    const match = todos.find(t => t.customer === customerName);
    if (match) setCompletedTodos(c => ({ ...c, [match.id]: true }));
  };

  const addAudit = (entry) => setAudit(a => [entry, ...a]);

  return (
    <div className="min-h-screen flex flex-col bg-slate-50">
      <TopBar
        activeTabId={activeTab}
        onTabChange={onTabChange}
        ctx={ctx}
        onCtxClear={() => setCtx(null)}
        onPalette={() => setPaletteOpen(true)}
        redlines={redlines}
        isEmbed={isEmbed}
      />

      <main className="flex-1">
        {activeTab === 'p1' && (
          <Page1 ctx={ctx} setCtx={setCtx} jumpToTab={jumpToTab}
            flashedCustomerName={flashedCustomerName}
            redlines={redlines}
            todos={todos}
            completedTodos={completedTodos}
            completeTodo={(id) => setCompletedTodos(c => ({ ...c, [id]: true }))} />
        )}
        {activeTab === 'p2' && (
          <Page2 ctx={ctx} setCtx={setCtx} jumpToTab={jumpToTab} />
        )}
        {activeTab === 'p3' && (
          <Page3 ctx={ctx} draftFromP2={draftFromP2} jumpToTab={jumpToTab}
            setDraftFromP2={setDraftFromP2}
            setRedlines={setRedlines}
            setFlashedCustomerName={setFlashedCustomerName}
            completeTodoFor={completeTodoFor}
            audit={audit} addAudit={addAudit} />
        )}
        {activeTab === 'p4' && <Page4 audit={audit} />}
      </main>

      <CommandPalette
        open={paletteOpen}
        onClose={() => setPaletteOpen(false)}
        onLocalJump={(view, ctxPayload) => {
          if (ctxPayload) setCtx(ctxPayload);
          setActiveTab(view);
        }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
